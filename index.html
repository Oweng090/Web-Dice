<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Dice</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/Dice.ico" type="ico">
</head>
<body>
    <div id="container" class="container">
    </div>
    <div id="leftDotContainer" class="container"></div>
    <div id="rightDotContainer" class="container"></div>
    <div id="RollButtonContainer" class="container">
        <button onclick="rollDice()" class="rollButton">Roll Dice</button>
    </div>

    <div id="ThemeTitle" class="container">
        <h1 id="ThemeOptionTitle" class="Title">Themes</h1>
    </div>

    <div id="ThemeOptionContainer" class="container">
        <h2 id="BackgroundColorH" class="ThemeH">Background Color</h2>
        <h2 id="DiceColorH" class="ThemeH">Dice Color</h2>
        <h2 id="DotColorH" class="ThemeH">Dot Color</h2>
    </div>
<div id="fileInput" class="container">
    <input type="file" id="fileInput" accept=".txt, text/plain">
    <div id="fileContentDisplay" class="Title"></div>
</div>
<div id="Colors" class="scroll-content">
    <div id="ThemeButtonContainer" class="container">
        <button onclick="backgroundWhite()" class="button">White</button>
        <button onclick="diceWhite()" class="button">White</button>
        <button onclick="dotWhite()" class="button">White</button>
    </div>
    <div id="BlackThemeButtonContainer" class="container">
        <button onclick="backgroundBlack()" class="button">Black</button>
        <button onclick="diceBlack()" class="button">Black</button>
        <button onclick="dotBlack()" class="button">Black</button>
    </div>
    <div id="RedThemeButtonContainer" class="container">
        <button onclick="backgroundRed()" class="button">Red</button>
        <button onclick="diceRed()" class="button">Red</button>
        <button onclick="dotRed()" class="button">Red</button>
    </div>
    <div id="BlueThemeButtonContainer" class="container">
        <button onclick="backgroundBlue()" class="button">Blue</button>
        <button onclick="diceBlue()" class="button">Blue</button>
        <button onclick="dotBlue()" class="button">Blue</button>
    </div>
    <div id="GreenThemeButtonContainer" class="container">
        <button onclick="backgroundGreen()" class="button">Green</button>
        <button onclick="diceGreen()" class="button">Green</button>
        <button onclick="dotGreen()" class="button">Green</button>
    </div>
    <div id="YellowThemeButtonContainer" class="container">
        <button onclick="backgroundYellow()" class="button">Yellow</button>
        <button onclick="diceYellow()" class="button">Yellow</button>
        <button onclick="dotYellow()" class="button">Yellow</button>
    </div>
    <div id="PurpleThemeButtonContainer" class="container">
        <button onclick="backgroundPurple()" class="button">Purple</button>
        <button onclick="dicePurple()" class="button">Purple</button>
        <button onclick="dotPurple()" class="button">Purple</button>
    </div>
</div>
    <script src="functions.js"></script>
    <script src="fileRead.js"></script>
</body>
</html>
